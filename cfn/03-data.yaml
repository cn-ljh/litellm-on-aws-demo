AWSTemplateFormatVersion: "2010-09-09"
Description: "LiteLLM Gateway - Aurora Serverless v2 PostgreSQL + ElastiCache Redis Serverless + S3 Config"

Parameters:
  ProjectName:
    Type: String
    Default: litellm-gw
  TenantName:
    Type: String
    Default: default
  DBName:
    Type: String
    Default: litellm
  MinACU:
    Type: Number
    Default: 0.5
    Description: "Aurora Serverless v2 minimum ACU (0.5 - 256)"
  MaxACU:
    Type: Number
    Default: 4
    Description: "Aurora Serverless v2 maximum ACU (0.5 - 256)"

Resources:
  # --- Security Groups ---
  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Allow PostgreSQL from ECS tasks"
      VpcId: !ImportValue
        Fn::Sub: "${ProjectName}-VpcId"
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-rds-sg"

  RedisSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Allow Redis from ECS tasks"
      VpcId: !ImportValue
        Fn::Sub: "${ProjectName}-VpcId"
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-redis-sg"

  # --- Aurora Serverless v2 PostgreSQL ---
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: "Private subnets for Aurora"
      SubnetIds:
        - !ImportValue
          Fn::Sub: "${ProjectName}-PrivateSubnet1Id"
        - !ImportValue
          Fn::Sub: "${ProjectName}-PrivateSubnet2Id"
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-db-subnet-group"

  AuroraCluster:
    Type: AWS::RDS::DBCluster
    DeletionPolicy: Snapshot
    Properties:
      DBClusterIdentifier: !Sub "${ProjectName}-aurora-cluster"
      Engine: aurora-postgresql
      EngineVersion: "16.6"
      DatabaseName: !Ref DBName
      MasterUsername: !Sub "{{resolve:secretsmanager:litellm/${TenantName}/db-password:SecretString:username}}"
      MasterUserPassword: !Sub "{{resolve:secretsmanager:litellm/${TenantName}/db-password:SecretString:password}}"
      DBSubnetGroupName: !Ref DBSubnetGroup
      VpcSecurityGroupIds:
        - !Ref RDSSecurityGroup
      ServerlessV2ScalingConfiguration:
        MinCapacity: !Ref MinACU
        MaxCapacity: !Ref MaxACU
      StorageEncrypted: true
      BackupRetentionPeriod: 7
      DeletionProtection: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-aurora-cluster"

  AuroraInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub "${ProjectName}-aurora-instance-1"
      DBClusterIdentifier: !Ref AuroraCluster
      DBInstanceClass: db.serverless
      Engine: aurora-postgresql
      PubliclyAccessible: false
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-aurora-instance-1"

  AuroraInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub "${ProjectName}-aurora-instance-2"
      DBClusterIdentifier: !Ref AuroraCluster
      DBInstanceClass: db.serverless
      Engine: aurora-postgresql
      PubliclyAccessible: false
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-aurora-instance-2"

  # --- ElastiCache Redis Serverless ---
  RedisServerless:
    Type: AWS::ElastiCache::ServerlessCache
    Properties:
      Engine: redis
      ServerlessCacheName: !Sub "${ProjectName}-redis"
      Description: "LiteLLM Redis cache (serverless)"
      SecurityGroupIds:
        - !Ref RedisSecurityGroup
      SubnetIds:
        - !ImportValue
          Fn::Sub: "${ProjectName}-PrivateSubnet1Id"
        - !ImportValue
          Fn::Sub: "${ProjectName}-PrivateSubnet2Id"
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-redis"

  # --- S3 Bucket for LiteLLM Config ---
  ConfigBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-config-${AWS::AccountId}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-config"

Outputs:
  RDSEndpoint:
    Value: !GetAtt AuroraCluster.Endpoint.Address
    Export:
      Name: !Sub "${ProjectName}-RDSEndpoint"
  RDSPort:
    Value: !GetAtt AuroraCluster.Endpoint.Port
    Export:
      Name: !Sub "${ProjectName}-RDSPort"
  RDSReaderEndpoint:
    Value: !GetAtt AuroraCluster.ReadEndpoint.Address
    Export:
      Name: !Sub "${ProjectName}-RDSReaderEndpoint"
  RedisEndpoint:
    Value: !GetAtt RedisServerless.Endpoint.Address
    Export:
      Name: !Sub "${ProjectName}-RedisEndpoint"
  RedisPort:
    Value: !GetAtt RedisServerless.Endpoint.Port
    Export:
      Name: !Sub "${ProjectName}-RedisPort"
  RDSSecurityGroupId:
    Value: !Ref RDSSecurityGroup
    Export:
      Name: !Sub "${ProjectName}-RDSSecurityGroupId"
  RedisSecurityGroupId:
    Value: !Ref RedisSecurityGroup
    Export:
      Name: !Sub "${ProjectName}-RedisSecurityGroupId"
  ConfigBucketName:
    Value: !Ref ConfigBucket
    Export:
      Name: !Sub "${ProjectName}-ConfigBucketName"
