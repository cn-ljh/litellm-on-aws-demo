model_list:
  # --- OpenAI ---
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4.1
    litellm_params:
      model: openai/gpt-4.1
      api_key: os.environ/OPENAI_API_KEY

  # --- Anthropic API ---
  - model_name: claude-sonnet-4-20250514
    litellm_params:
      model: anthropic/claude-sonnet-4-20250514
      api_key: os.environ/ANTHROPIC_API_KEY
      additional_drop_params:
        - context_management

  - model_name: claude-haiku-4-5-20251001
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY
      additional_drop_params:
        - context_management

  # --- AWS Bedrock (IAM task role, no API key needed) ---
  - model_name: claude-opus-4-7
    litellm_params:
      model: bedrock/us.anthropic.claude-opus-4-7
      aws_region_name: us-east-1
      additional_drop_params:
        - context_management
    # LiteLLM 1.83.7-stable 的 model_prices 里还没有 4.7 条目，
    # 手工注入 context window 和定价（按 Opus 4.6 同价占位，待 AWS 官方公布再校正）
    model_info:
      max_input_tokens: 200000
      max_output_tokens: 32000
      input_cost_per_token: 0.000015
      output_cost_per_token: 0.000075
      supports_function_calling: true
      supports_vision: true
      supports_prompt_caching: true

  - model_name: claude-opus-4-6
    litellm_params:
      model: bedrock/us.anthropic.claude-opus-4-6-v1
      aws_region_name: us-east-1
      additional_drop_params:
        - context_management

  - model_name: claude-sonnet-4-6
    litellm_params:
      model: bedrock/us.anthropic.claude-sonnet-4-6
      aws_region_name: us-east-1
      additional_drop_params:
        - context_management

  - model_name: claude-haiku-4-5
    litellm_params:
      model: bedrock/us.anthropic.claude-haiku-4-5-20251001-v1:0
      aws_region_name: us-east-1
      additional_drop_params:
        - context_management

  # --- Google Gemini ---
  - model_name: gemini-2.0-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GEMINI_API_KEY

  - model_name: gemini-2.5-pro
    litellm_params:
      model: gemini/gemini-2.5-pro-preview-05-06
      api_key: os.environ/GEMINI_API_KEY

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true

# --- MCP (Model Context Protocol) Servers ---
# 通过 LiteLLM Proxy 统一暴露给所有客户端使用，由 LiteLLM 转发请求并附带认证 header。
# 客户端调用方式：在 /v1/responses 或 /v1/chat/completions 的 tools 数组里指定
#   { "type": "mcp", "server_label": "litellm", "server_url": "litellm_proxy", "require_approval": "never" }
# 详见 https://docs.litellm.ai/docs/mcp
#
# ⚠️ 不要在 yaml 里写明文 API key——所有密钥通过 ECS Secrets 注入到环境变量，
#    yaml 用 os.environ/XXX 占位符，LiteLLM 启动时递归替换为真实值。
mcp_servers:
  # Tavily：实时 Web 搜索（支持 time_range、深度控制）
  # 远程 endpoint 自动通过 Authorization: Bearer <key> 认证
  tavily:
    url: "https://mcp.tavily.com/mcp/"
    transport: "http"
    auth_type: "bearer_token"
    auth_value: os.environ/TAVILY_API_KEY
    description: "Tavily real-time web search and content extraction"

  # Exa：LLM 优化的 Web 搜索 + 代码搜索 + 企业研究
  # 远程 endpoint 用自定义 header x-api-key 认证（不是标准 Bearer）
  exa:
    url: "https://mcp.exa.ai/mcp"
    transport: "http"
    static_headers:
      x-api-key: os.environ/EXA_API_KEY
    description: "Exa AI-optimized web search, code search, and company research"

litellm_settings:
  callbacks: ["bedrock_ctx_stripper.bedrock_ctx_stripper_instance"]
  num_retries: 3
  # 总请求超时（秒）：3 分钟兜底，避免客户端（Claude Code）卡住等 10 分钟
  request_timeout: 180
  # 单次上游调用超时（秒）：Bedrock Opus 偶发 p99=90s+ 慢请求，120s 内拿不到就主动断开，
  # 让 num_retries 快速重试——Bedrock 慢是偶发的，重试大概率命中正常 p50=6s 响应
  timeout: 120
  set_verbose: false
  drop_params: true
  additional_drop_params:
    - context_management
  cache: true
  cache_params:
    type: redis
    host: os.environ/REDIS_HOST
    port: os.environ/REDIS_PORT
    ssl: true
