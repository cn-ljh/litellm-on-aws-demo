model_list:
  # --- OpenAI ---
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4.1
    litellm_params:
      model: openai/gpt-4.1
      api_key: os.environ/OPENAI_API_KEY

  # --- Anthropic API ---
  - model_name: claude-sonnet-4-20250514
    litellm_params:
      model: anthropic/claude-sonnet-4-20250514
      api_key: os.environ/ANTHROPIC_API_KEY
      additional_drop_params:
        - context_management

  - model_name: claude-haiku-4-5-20251001
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY
      additional_drop_params:
        - context_management

  # --- AWS Bedrock (IAM task role, no API key needed) ---
  - model_name: claude-opus-4-8
    litellm_params:
      model: bedrock/us.anthropic.claude-opus-4-8
      aws_region_name: us-east-1
      additional_drop_params:
        - context_management
    # LiteLLM cost map 暂未收录 4.8，手工注入 context window + 定价（按 Opus 同价占位）
    model_info:
      max_input_tokens: 200000
      max_output_tokens: 32000
      input_cost_per_token: 0.000015
      output_cost_per_token: 0.000075
      supports_function_calling: true
      supports_vision: true
      supports_prompt_caching: true

  - model_name: claude-opus-4-7
    litellm_params:
      model: bedrock/us.anthropic.claude-opus-4-7
      aws_region_name: us-east-1
      additional_drop_params:
        - context_management
    # LiteLLM 1.83.7-stable 的 model_prices 里还没有 4.7 条目，
    # 手工注入 context window 和定价（按 Opus 4.6 同价占位，待 AWS 官方公布再校正）
    model_info:
      max_input_tokens: 200000
      max_output_tokens: 32000
      input_cost_per_token: 0.000015
      output_cost_per_token: 0.000075
      supports_function_calling: true
      supports_vision: true
      supports_prompt_caching: true

  - model_name: claude-opus-4-6
    litellm_params:
      model: bedrock/us.anthropic.claude-opus-4-6-v1
      aws_region_name: us-east-1
      additional_drop_params:
        - context_management

  - model_name: claude-sonnet-4-6
    litellm_params:
      model: bedrock/us.anthropic.claude-sonnet-4-6
      aws_region_name: us-east-1
      additional_drop_params:
        - context_management

  - model_name: claude-haiku-4-5
    litellm_params:
      model: bedrock/us.anthropic.claude-haiku-4-5-20251001-v1:0
      aws_region_name: us-east-1
      additional_drop_params:
        - context_management

  # Claude Fable 5 (Mythos-class) — 2026-06-10 接入
  # 关键: aws_region_name 必须是 Fable 服务区(us-east-1)；该区账户数据保留已设 provider_data_share。
  # 只有 global profile，无 us./eu. 形态；裸 ID 不支持 on-demand。
  # adaptive thinking 常开不可关；temperature 必须=1.0 或不设。
  - model_name: claude-fable-5
    litellm_params:
      model: bedrock/global.anthropic.claude-fable-5
      aws_region_name: us-east-1
      input_cost_per_token: 0.00001                      # $10  / 1M
      output_cost_per_token: 0.00005                     # $50  / 1M
      cache_creation_input_token_cost: 0.0000125         # $12.5/ 1M (5m 写)
      cache_read_input_token_cost: 0.000001              # $1   / 1M (读)
      cache_creation_input_token_cost_above_1hr: 0.00002 # $20  / 1M (1h 写)
      additional_drop_params:
        - context_management
    model_info:
      supports_prompt_caching: true
      max_input_tokens: 1000000                          # Fable 支持 1M 上下文

  # --- Google Gemini ---
  - model_name: gemini-2.0-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GEMINI_API_KEY

  - model_name: gemini-2.5-pro
    litellm_params:
      model: gemini/gemini-2.5-pro-preview-05-06
      api_key: os.environ/GEMINI_API_KEY

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true

# --- MCP (Model Context Protocol) Servers ---
# 通过 LiteLLM Proxy 统一暴露搜索能力给所有客户端，由 LiteLLM 转发请求并附带认证 header。
# 客户端调用方式：
#   POST /mcp/   (JSON-RPC, MCP 协议) ↓
#   或在 /v1/responses tools 数组里指定：
#     { "type": "mcp", "server_label": "litellm", "server_url": "litellm_proxy", "require_approval": "never" }
# 详见 https://docs.litellm.ai/docs/mcp
#
# ⚠️ 重要：MCP server 配置走 DB（admin REST API POST /v1/mcp/server），不在 yaml 里写
#    原因：1.85.2 的 yaml-only mcp_servers 鉴权链路不完善，admin 调 tools/list 返回空。
#    DB 路径 + allow_all_keys=true 是当前唯一可靠方案。
#
# 部署后必须运行 scripts/sync-mcp-servers.sh 一次（或 Admin UI 手动）来同步 server 入库。
# 真实 API key 从 Secrets Manager 注入到容器 env (TAVILY_API_KEY / EXA_API_KEY)，
# sync 脚本读取这两个 env 调 admin API 创建 server。

litellm_settings:
  callbacks: ["bedrock_ctx_stripper.bedrock_ctx_stripper_instance"]
  num_retries: 3
  # 总请求超时（秒）：3 分钟兜底，避免客户端（Claude Code）卡住等 10 分钟
  request_timeout: 180
  # 单次上游调用超时（秒）：Bedrock Opus 偶发 p99=90s+ 慢请求，120s 内拿不到就主动断开，
  # 让 num_retries 快速重试——Bedrock 慢是偶发的，重试大概率命中正常 p50=6s 响应
  timeout: 120
  set_verbose: false
  drop_params: true
  additional_drop_params:
    - context_management
  cache: true
  cache_params:
    type: redis
    host: os.environ/REDIS_HOST
    port: os.environ/REDIS_PORT
    ssl: true
